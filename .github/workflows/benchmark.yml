name: Benchmark
on:
  schedule:
    - cron: '0 4 * * *'  # Daily at 04:00 UTC
  pull_request:
  workflow_dispatch:
    inputs:
      sdk_version:
        description: 'Specific SDK version (empty = latest nightly)'
        required: false
        default: ''
        type: string
      sdk_channel:
        description: '.NET SDK channel'
        required: false
        default: '11.0'
        type: string
      dry_run:
        description: 'Dry run (run benchmarks but do not publish results)'
        required: false
        default: false
        type: boolean

jobs:
  # ── Job 1: Build all apps ──────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/${{ github.repository }}/browser-bench-build:latest
    timeout-minutes: 60
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Install npm dependencies
        run: npm ci

      - name: Export container env to GitHub Actions
        shell: bash
        run: echo "ARTIFACTS_DIR=${ARTIFACTS_DIR:-artifacts}" >> "$GITHUB_ENV"

      - name: Build all apps (continue on failure)
        id: build
        shell: bash
        run: |
          MATRIX=$(node scripts/run-pipeline.mjs \
            --build-only \
            --sdk-channel "${{ inputs.sdk_channel || '11.0' }}" \
            ${{ inputs.sdk_version && format('--sdk-version "{0}"', inputs.sdk_version) || '' }} \
            --runtime mono)
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Build matrix: $MATRIX" >&2

      - name: Upload SDK info
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sdk-info
          path: ${{ env.ARTIFACTS_DIR || 'artifacts' }}/sdk/sdk-info.json
          if-no-files-found: error
          retention-days: 7

      - name: Upload individual builds
        if: always() && steps.build.outputs.matrix != ''
        shell: bash
        env:
          BUILD_MATRIX: ${{ steps.build.outputs.matrix }}
        run: |
          npm install --no-save @actions/artifact 2>&1 | tail -1
          node << 'UPLOAD_SCRIPT'
          const { DefaultArtifactClient } = require('@actions/artifact');
          const { readdirSync, statSync } = require('fs');
          const { join } = require('path');

          function getFilesRecursive(dir) {
            const results = [];
            for (const entry of readdirSync(dir, { withFileTypes: true })) {
              const full = join(dir, entry.name);
              if (entry.isDirectory()) results.push(...getFilesRecursive(full));
              else results.push(full);
            }
            return results;
          }

          async function main() {
            const matrix = JSON.parse(process.env.BUILD_MATRIX || '[]');
            const artifactsDir = process.env.ARTIFACTS_DIR || 'artifacts';
            const client = new DefaultArtifactClient();

            for (const { app, preset } of matrix) {
              const publishDir = join(artifactsDir, 'publish', app, preset);
              const name = `build-${app}-${preset}`;
              try {
                const files = getFilesRecursive(publishDir);
                if (files.length === 0) {
                  console.log(`⚠ ${name}: no files, skipping`);
                  continue;
                }
                console.log(`Uploading ${name} (${files.length} files)...`);
                const { size } = await client.uploadArtifact(name, files, publishDir, { retentionDays: 3 });
                console.log(`✓ ${name}: ${(size / 1024 / 1024).toFixed(1)} MB`);
              } catch (err) {
                console.error(`✗ ${name}: ${err.message}`);
              }
            }
          }

          main().catch(err => { console.error(err); process.exit(1); });
          UPLOAD_SCRIPT

  # ── Job 2: Measure (matrix: app × preset, all engines per job) ─────────────
  measure:
    needs: build
    if: needs.build.outputs.matrix != '[]' && needs.build.outputs.matrix != ''
    runs-on: ubuntu-latest
    container: ghcr.io/${{ github.repository }}/browser-bench-measure:latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.build.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            scripts/
            package.json
            package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Download SDK info
        uses: actions/download-artifact@v4
        with:
          name: sdk-info
          path: artifacts/sdk

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build-${{ matrix.app }}-${{ matrix.preset }}
          path: artifacts/publish/${{ matrix.app }}/${{ matrix.preset }}

      - name: Run measurements
        shell: bash
        run: |
          node scripts/run-measure-job.mjs \
            --app "${{ matrix.app }}" \
            --preset "${{ matrix.preset }}" \
            --publish-dir "artifacts/publish/${{ matrix.app }}/${{ matrix.preset }}" \
            --sdk-info artifacts/sdk/sdk-info.json \
            --output-dir artifacts/results \
            --runtime mono \
            --retries 3 \
            --timeout 300000 \
            --ci-run-id "${{ github.run_id }}" \
            --ci-run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            ${{ (inputs.dry_run || github.event_name == 'pull_request') && '--dry-run' || '' }}

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ matrix.app }}-${{ matrix.preset }}
          path: artifacts/results/*.json
          if-no-files-found: ignore
          retention-days: 7

  # ── Job 3: Consolidate results ─────────────────────────────────────────────
  consolidate:
    needs: [build, measure]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            scripts/
            package.json
            package-lock.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install npm dependencies
        run: npm ci

      - name: Download all result artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: results-*
          path: artifacts/all-results/
          merge-multiple: true

      - name: Upload consolidated results
        uses: actions/upload-artifact@v4
        if: ${{ always() && github.event_name != 'pull_request' && !inputs.dry_run }}
        with:
          name: benchmark-results
          path: artifacts/all-results/*.json
          if-no-files-found: ignore
          retention-days: 7
