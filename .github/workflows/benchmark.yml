name: Benchmark
on:
  schedule:
    - cron: '0 4 * * *'  # Daily at 04:00 UTC
  workflow_dispatch:
    inputs:
      sdk_version:
        description: 'Specific SDK version (empty = latest nightly)'
        required: false
        default: ''
        type: string
      sdk_channel:
        description: '.NET SDK channel'
        required: false
        default: '11.0'
        type: string

jobs:
  bench:
    runs-on: ubuntu-latest
    container: ghcr.io/${{ github.repository }}/browser-bench:latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        #runtime: [coreclr, mono]
        #preset: [no-workload, aot, native-relink, invariant, no-reflection-emit, debug]
        runtime: [mono]
        preset: [no-workload]
        exclude:
          # AOT is Mono-only
          - runtime: coreclr
            preset: aot
    steps:
      - uses: actions/checkout@v4

      - name: Resolve SDK
        run: ./scripts/resolve-sdk.sh "${{ inputs.sdk_channel || '11.0' }}" "${{ inputs.sdk_version }}"

      - name: Build app
        run: ./scripts/build-app.sh empty-browser ${{ matrix.runtime }} ${{ matrix.preset }}

      - name: Run benchmark
        run: |
          SDK_INFO_FILE="${ARTIFACTS_DIR:-artifacts}/sdk/sdk-info.json"
          GIT_HASH=$(jq -r .gitHash "$SDK_INFO_FILE")
          GIT_HASH7=${GIT_HASH:0:7}
          COMMIT_TIME=$(jq -r .commitTime "$SDK_INFO_FILE")
          FILENAME="${COMMIT_TIME}_${GIT_HASH7}_${{ matrix.runtime }}_${{ matrix.preset }}_chrome_empty-browser.json"

          node scripts/measure-external.mjs \
            --app empty-browser \
            --publish-dir "${ARTIFACTS_DIR:-artifacts}/publish/empty-browser/wwwroot" \
            --sdk-info "${ARTIFACTS_DIR:-artifacts}/sdk/sdk-info.json" \
            --compile-time-file "${ARTIFACTS_DIR:-artifacts}/results/compile-time.json" \
            --runtime ${{ matrix.runtime }} \
            --preset ${{ matrix.preset }} \
            --ci-run-id "${{ github.run_id }}" \
            --ci-run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --retries 3 \
            --timeout 300000 \
            --output "${ARTIFACTS_DIR:-artifacts}/results/${FILENAME}"

      - name: Upload result
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: result_${{ matrix.runtime }}_${{ matrix.preset }}_chrome_empty-browser
          path: ${{ env.ARTIFACTS_DIR || 'artifacts' }}/results/*.json
          if-no-files-found: ignore
          retention-days: 7
