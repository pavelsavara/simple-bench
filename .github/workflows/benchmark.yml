name: Benchmark
on:
  schedule:
    - cron: '0 4 * * *'  # Daily at 04:00 UTC
  pull_request:
  workflow_dispatch:
    inputs:
      sdk_version:
        description: 'Specific SDK version (empty = latest nightly)'
        required: false
        default: ''
        type: string
      sdk_channel:
        description: '.NET SDK channel'
        required: false
        default: '11.0'
        type: string
      runtime_commit:
        description: 'Specific dotnet/runtime commit hash to benchmark (patches SDK with matching runtime pack)'
        required: false
        default: ''
        type: string
      dry_run:
        description: 'Dry run (run benchmarks but do not publish results)'
        required: false
        default: false
        type: boolean

jobs:
  # ── Job 1: Build all apps ──────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/${{ github.repository }}/browser-bench-build:latest
    timeout-minutes: 60
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - name: Export container env to GitHub Actions
        shell: bash
        run: echo "ARTIFACTS_DIR=${ARTIFACTS_DIR:-artifacts}" >> "$GITHUB_ENV"

      - name: Build all apps
        shell: bash
        run: |
          node scripts/run-pipeline.mjs \
            --sdk-channel "${{ inputs.sdk_channel || '11.0' }}" \
            ${{ inputs.sdk_version && format('--sdk-version "{0}"', inputs.sdk_version) || '' }} \
            ${{ inputs.runtime_commit && format('--runtime-commit "{0}"', inputs.runtime_commit) || '' }} \
            --runtime mono \
            ${{ (inputs.dry_run || github.event_name == 'pull_request') && '--dry-run' || '' }}

      - name: Read run ID
        id: run-id
        shell: bash
        run: |
          RUN_ID=$(cat "${ARTIFACTS_DIR:-artifacts}/results/.run-id")
          echo "run-id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "Run ID: $RUN_ID" >&2

      - name: Set matrix output
        id: matrix
        shell: bash
        run: |
          MANIFEST="${ARTIFACTS_DIR:-artifacts}/results/${{ steps.run-id.outputs.run-id }}/build-manifest.json"
          if [ ! -f "$MANIFEST" ]; then
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
            echo "⚠ No build manifest found" >&2
            exit 0
          fi
          # Read commitDate from sdk-info.json for the publish path hierarchy
          SDK_INFO="${ARTIFACTS_DIR:-artifacts}/results/${{ steps.run-id.outputs.run-id }}/sdk-info.json"
          COMMIT_DATE="local"
          if [ -f "$SDK_INFO" ]; then
            COMMIT_DATE=$(node --input-type=module -e "
              import { readFileSync } from 'node:fs';
              const info = JSON.parse(readFileSync('$SDK_INFO', 'utf-8'));
              console.log(info.commitDate || 'local');
            ")
          fi
          # Extract {app, preset, commitDate} for the GHA matrix
          MATRIX=$(node --input-type=module -e "
            import { readFileSync } from 'node:fs';
            const m = JSON.parse(readFileSync('$MANIFEST', 'utf-8'));
            console.log(JSON.stringify(m.map(e => ({ app: e.app, preset: e.preset, commitDate: '$COMMIT_DATE' }))));
          ")
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Build matrix: $MATRIX" >&2

      - name: Upload SDK info
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sdk-info
          path: ${{ env.ARTIFACTS_DIR || 'artifacts' }}/results/${{ steps.run-id.outputs.run-id }}/sdk-info.json
          if-no-files-found: error
          retention-days: 7

      - name: Upload build manifest
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-manifest
          path: ${{ env.ARTIFACTS_DIR || 'artifacts' }}/results/${{ steps.run-id.outputs.run-id }}/build-manifest.json
          if-no-files-found: error
          retention-days: 7

      - name: Upload all builds
        uses: actions/upload-artifact@v4
        if: always() && steps.matrix.outputs.matrix != '[]'
        with:
          name: all-builds
          path: ${{ env.ARTIFACTS_DIR || 'artifacts' }}/publish/
          if-no-files-found: error
          retention-days: 3

  # ── Job 2: Measure (matrix: app × preset, all engines per job) ─────────────
  measure:
    needs: build
    if: needs.build.outputs.matrix != '[]' && needs.build.outputs.matrix != ''
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/browser-bench-measure:latest
      options: --user 1001
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.build.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false
          sparse-checkout: |
            scripts/
            package.json
            package-lock.json

      - name: Download SDK info
        uses: actions/download-artifact@v4
        with:
          name: sdk-info
          path: artifacts/sdk

      - name: Download build manifest
        uses: actions/download-artifact@v4
        with:
          name: build-manifest
          path: artifacts/results

      - name: Download builds
        uses: actions/download-artifact@v4
        with:
          name: all-builds
          path: artifacts/publish

      - name: Link pre-installed dependencies
        shell: bash
        run: ln -s /bench/node_modules node_modules

      - name: Run measurements
        shell: bash
        run: |
          node scripts/run-measure-job.mjs \
            --app "${{ matrix.app }}" \
            --preset "${{ matrix.preset }}" \
            --publish-dir "artifacts/publish/${{ matrix.app }}/${{ matrix.commitDate }}/${{ matrix.preset }}" \
            --sdk-info artifacts/sdk/sdk-info.json \
            --build-manifest artifacts/results/build-manifest.json \
            --output-dir artifacts/results \
            --runtime mono \
            --retries 3 \
            --timeout 300000 \
            --ci-run-id "${{ github.run_id }}" \
            --ci-run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            ${{ (inputs.dry_run || github.event_name == 'pull_request') && '--dry-run' || '' }}

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ matrix.app }}-${{ matrix.preset }}
          path: artifacts/results/*.json
          if-no-files-found: ignore
          retention-days: 7
