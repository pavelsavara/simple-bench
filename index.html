<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>.NET WASM Benchmark Dashboard</title>
    <link rel="stylesheet" href="app/style.css">
    <script src="app/vendor/chart.umd.min.js"></script>
    <script src="app/vendor/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="app/vendor/hammer.min.js"></script>
    <script src="app/vendor/chartjs-plugin-zoom.min.js"></script>
</head>

<body>
    <header id="header">
        <h1>.NET WASM Benchmark Dashboard</h1>
        <div id="header-info">
            <span id="last-updated"></span>
            <span id="data-points"></span>
            <a href="https://github.com/pavelsavara/simple-bench" target="_blank">GitHub</a>
        </div>
    </header>

    <div id="layout">
        <aside id="sidebar">
            <section id="filter-runtime">
                <h3>Runtime</h3>
            </section>
            <section id="filter-preset">
                <h3>Preset</h3>
            </section>
            <section id="filter-profile">
                <h3>Profile</h3>
            </section>
            <section id="filter-engine">
                <h3>Engine</h3>
            </section>
        </aside>

        <main id="content">
            <nav id="app-tabs">
                <button class="tab active" data-app="empty-browser">empty-browser</button>
                <button class="tab" data-app="empty-blazor">empty-blazor</button>
                <button class="tab" data-app="blazing-pizza">blazing-pizza</button>
                <button class="tab" data-app="microbenchmarks">microbenchmarks</button>
            </nav>

            <div id="timeline-container"></div>

            <div id="charts-container"></div>

            <div id="loading-indicator" class="hidden">Loading...</div>
            <div id="empty-state" class="hidden">No data for selected filters. Try broadening your selection.</div>
        </main>
    </div>

    <script type="module" src="app/app.js"></script>
</body>

</html>
